<!doctype html>
<html lang="ja">

<title>法定相続分シミュレーター（仮）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif; }
  .badge { display:inline-block; padding:.05rem .4rem; font-size:.7rem; border-radius:.25rem; }
  /* 関係図 */
  .rel-node { display:inline-flex; flex-direction:column; align-items:center; min-width:80px; padding:.4rem .6rem; border:1px solid #d6d3d1; border-radius:.5rem; background:#fff; font-size:.78rem; line-height:1.2; }
  .rel-node .name { font-weight:600; }
  .rel-node .role { color:#78716c; font-size:.68rem; }
  .rel-node .share { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; color:#047857; font-size:.95rem; margin-top:.2rem; }
  .rel-node.heir { border-color:#10b981; background:#ecfdf5; box-shadow:0 0 0 1px #d1fae5 inset; }
  .rel-node.dead { background:#f5f5f4; color:#a8a29e; }
  .rel-node.dead .name { text-decoration:line-through; color:#a8a29e; }

  .rel-node.decedent .role { color:#d6d3d1; }

  @media print {
    body { background:#fff; }
    .no-print { display:none !important; }

</style>

<!-- React + Babel via CDN（ビルド不要のMVP用）-->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./calc.js"></script>

<script type="text/babel" data-presets="react">
'use strict';
const { useState, useMemo, useEffect, createContext, useContext } = React;
const { calculate, calculateExtended, formatFrac } = window.SouzokuCalc;
const { glossary, qa } = window.SouzokuGlossary;

const GlossaryContext = createContext({ open: () => {} });

/* =========================================================
   ウィザードUI
   ========================================================= */

const initialState = {
  step: 0,
  spouse: { present: null, alive: true, renounced: false }, // present: null未回答 / true / false
  hasChildren: null,         // null/true/false
  childrenCount: 1,
  children: [],              // [{id, name, alive, renounced, disqualified, adopted, descendants:[再帰]}]
  // 直系尊属：両親→祖父母 と段階的に
  parentsStatus: null,       // null未回答 / 'someAlive' / 'allDead'
  parentsAliveCount: 1,      // 1 or 2
  parents: [
    {id:'p1', name:'父', alive:true, renounced:false},
    {id:'p2', name:'母', alive:true, renounced:false}
  ],
  grandparentsStatus: null,  // null未回答 / 'someAlive' / 'allDead'   (parentsStatus==='allDead'のときのみ)
  grandparentsCount: 1,      // 1〜4
  grandparents: [
    {id:'gp1', name:'父方の祖父', alive:true, renounced:false},
    {id:'gp2', name:'父方の祖母', alive:true, renounced:false},
    {id:'gp3', name:'母方の祖父', alive:true, renounced:false},
    {id:'gp4', name:'母方の祖母', alive:true, renounced:false}
  ],
  hasSiblings: null,
  siblingsCount: 1,
  siblings: [],
};

function makeChild(i) {
  return { id: `c${i}`, name: `子${i}`, alive: true, renounced: false, hasGrandchildren:false, grandchildrenCount:0, descendants:[] };
}
function makeSibling(i) {
  return { id: `s${i}`, name: `兄弟姉妹${i}`, alive: true, renounced: false, hasNiblings:false, niblingsCount:0, descendants:[] };
}
function makeGrand(parentI, i) {
  return { id: `g${parentI}-${i}`, name: `孫(${parentI}-${i})`, alive:true, renounced:false };
}
function makeNibling(parentI, i) {
  return { id: `nb${parentI}-${i}`, name: `甥姪(${parentI}-${i})`, alive:true, renounced:false };
}

// サンプルケース（典型的なパターン）
const SAMPLES = [
  {
    id: 'spouse-2children',
    title: '配偶者＋子2人',
    desc: '最も多いケース',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: true,
      childrenCount: 2,
      children: [
        { id: 'c1', name: '長男', alive: true, renounced: false, hasGrandchildren: false, grandchildrenCount: 0, descendants: [] },
        { id: 'c2', name: '長女', alive: true, renounced: false, hasGrandchildren: false, grandchildrenCount: 0, descendants: [] }
      ]
    })
  },
  {
    id: 'spouse-parents',
    title: '配偶者＋ご両親',
    desc: 'お子さんがいない方が亡くなり、ご両親がご健在',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'someAlive',
      parentsAliveCount: 2
    })
  },
  {
    id: 'spouse-siblings',
    title: '配偶者＋ご兄弟2人',
    desc: 'お子さんも親もいない方が亡くなり、ご兄弟がいる',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'allDead',
      grandparentsStatus: 'allDead',
      hasSiblings: true,
      siblingsCount: 2,
      siblings: [
        { id: 's1', name: '兄', alive: true, renounced: false, hasNiblings: false, niblingsCount: 0, descendants: [] },
        { id: 's2', name: '妹', alive: true, renounced: false, hasNiblings: false, niblingsCount: 0, descendants: [] }
      ]
    })
  },
  {
    id: 'representation-grandchild',
    title: '代襲相続：亡き子＋孫2人',
    desc: 'お子さんが先に亡くなっており、孫が代襲',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: true,
      childrenCount: 2,
      children: [
        { id: 'c1', name: '長男', alive: true, renounced: false, hasGrandchildren: false, grandchildrenCount: 0, descendants: [] },
        { id: 'c2', name: '亡き次男', alive: false, renounced: false, hasGrandchildren: true, grandchildrenCount: 2,
          descendants: [
            { id: 'g2-1', name: '孫A', alive: true, renounced: false },
            { id: 'g2-2', name: '孫B', alive: true, renounced: false }
          ]
        }
      ]
    })
  },
  {
    id: 'half-blood',
    title: '半血兄弟が混在',
    desc: '父母とも同じ兄＋父違いの異父弟',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'allDead',
      grandparentsStatus: 'allDead',
      hasSiblings: true,
      siblingsCount: 2,
      siblings: [
        { id: 's1', name: '兄（全血）', alive: true, renounced: false, halfBlood: false, hasNiblings: false, niblingsCount: 0, descendants: [] },
        { id: 's2', name: '弟（半血）', alive: true, renounced: false, halfBlood: true, hasNiblings: false, niblingsCount: 0, descendants: [] }
      ]
    })
  },
  {
    id: 'sibling-niece',
    title: '亡き兄＋甥姪2人で代襲',
    desc: 'お子さんも親もなく、亡き兄の子（甥姪）が代襲',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'allDead',
      grandparentsStatus: 'allDead',
      hasSiblings: true,
      siblingsCount: 1,
      siblings: [
        { id: 's1', name: '亡き兄', alive: false, renounced: false, halfBlood: false,
          hasNiblings: true, niblingsCount: 2,
          descendants: [
            { id: 'nb1-1', name: '甥', alive: true, renounced: false },
            { id: 'nb1-2', name: '姪', alive: true, renounced: false }
          ]
        }
      ]
    })
  },
  {
    id: 'renounce-to-parents',
    title: '子全員放棄→親へ',
    desc: '借金回避でお子さん全員が放棄、ご両親に相続権が移る',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: true,
      childrenCount: 2,
      children: [
        { id: 'c1', name: '長男（放棄）', alive: true, renounced: true, hasGrandchildren: false, grandchildrenCount: 0, descendants: [] },
        { id: 'c2', name: '長女（放棄）', alive: true, renounced: true, hasGrandchildren: false, grandchildrenCount: 0, descendants: [] }
      ],
      parentsStatus: 'someAlive',
      parentsAliveCount: 2
    })
  },
  {
    id: 'grandparents',
    title: '父母全員他界→祖父母が相続',
    desc: 'お子さんも親もなく、祖父母がご健在',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'allDead',
      grandparentsStatus: 'someAlive',
      grandparentsCount: 2
    })
  },
  {
    id: 'simultaneous',
    title: '同時死亡：交通事故で父子',
    desc: '父と子Aが同じ事故で同時死亡、子Aには孫がいて代襲',
    apply: () => ({
      ...initialState,
      spouse: { present: true, alive: true, renounced: false, name: '配偶者' },
      hasChildren: true,
      childrenCount: 2,
      children: [
        { id: 'c1', name: '子A（同時死亡）', alive: false, simultaneousDeath: true,
          renounced: false, hasGrandchildren: true, grandchildrenCount: 1,
          descendants: [
            { id: 'g1-1', name: '孫A1', alive: true, renounced: false }
          ]
        },
        { id: 'c2', name: '子B', alive: true, renounced: false,
          hasGrandchildren: false, grandchildrenCount: 0, descendants: [] }
      ]
    })
  },
  {
    id: 'sequential',
    title: '数次相続：兄が後で死亡',
    desc: 'C独身/子なし/親なし、兄Bが後で死亡しBの配偶者D・子E/Fが承継',
    apply: () => ({
      ...initialState,
      spouse: { present: false, alive: true, renounced: false, name: '配偶者' },
      hasChildren: false,
      parentsStatus: 'allDead',
      grandparentsStatus: 'allDead',
      hasSiblings: true,
      siblingsCount: 1,
      siblings: [
        {
          id: 's1', name: '兄B', alive: false, renounced: false, halfBlood: false,
          diedAfter: true,
          hasNiblings: false, niblingsCount: 0, descendants: [],
          successors: {
            spouse: { present: true, alive: true, name: 'Bの配偶者D' },
            children: [
              { id: 'succ-s1-1', name: 'Bの子E', alive: true, renounced: false },
              { id: 'succ-s1-2', name: 'Bの子F', alive: true, renounced: false }
            ]
          }
        }
      ]
    })
  }
];

function App() {
  const [state, setState] = useState(initialState);
  const [showResult, setShowResult] = useState(false);
  const [openTerm, setOpenTerm] = useState(null);

  // 入力 → 計算用データへ整形
  const calcInput = useMemo(() => {
    // 父母：1人以上ご存命を選んでいて、人数分だけ alive:true として渡す
    const parents = state.parentsStatus === 'someAlive'
      ? state.parents.slice(0, state.parentsAliveCount).map(p => ({ ...p, alive: true }))
      : state.parentsStatus === 'allDead'
        ? state.parents.map(p => ({ ...p, alive: false }))
        : [];
    // 祖父母：父母全員他界 かつ「祖父母にご存命の方あり」なら、人数分 alive:true
    const grandparents = (state.parentsStatus === 'allDead' && state.grandparentsStatus === 'someAlive')
      ? state.grandparents.slice(0, state.grandparentsCount).map(p => ({ ...p, alive: true }))
      : [];
    return {
      spouse: state.spouse.present ? { ...state.spouse, label: '配偶者' } : null,
      children: state.hasChildren ? state.children : [],
      parents,
      grandparents,
      siblings: state.hasSiblings ? state.siblings : []
    };
  }, [state]);

  const result = useMemo(() => calculateExtended(calcInput), [calcInput]);
  const ctxValue = useMemo(() => ({ open: setOpenTerm }), []);

  const update = (patch) => setState(s => ({ ...s, ...patch }));

  // 子の数の変更 → 配列を作り直す
  useEffect(() => {
    if (!state.hasChildren) return;
    setState(s => {
      const arr = [];
      for (let i=1; i<=s.childrenCount; i++) {
        arr.push(s.children[i-1] || makeChild(i));
      }
      return { ...s, children: arr };
    });
  }, [state.hasChildren, state.childrenCount]);

  useEffect(() => {
    if (!state.hasSiblings) return;
    setState(s => {
      const arr = [];
      for (let i=1; i<=s.siblingsCount; i++) {
        arr.push(s.siblings[i-1] || makeSibling(i));
      }
      return { ...s, siblings: arr };
    });
  }, [state.hasSiblings, state.siblingsCount]);

  // 子の死亡フラグを切り替えたら descendants を初期化
  const toggleChildAlive = (idx, alive) => {
    setState(s => {
      const children = [...s.children];
      const c = { ...children[idx], alive };
      if (!alive && (!c.descendants || c.descendants.length===0)) {
        c.hasGrandchildren = false;
        c.grandchildrenCount = 0;
        c.descendants = [];
      }
      children[idx] = c;
      return { ...s, children };
    });
  };

  const setChild = (idx, patch) => {
    setState(s => {
      const children = [...s.children];
      children[idx] = { ...children[idx], ...patch };
      return { ...s, children };
    });
  };

  const setSibling = (idx, patch) => {
    setState(s => {
      const siblings = [...s.siblings];
      siblings[idx] = { ...siblings[idx], ...patch };
      return { ...s, siblings };
    });
  };

  const setGrandcount = (childIdx, count) => {
    setState(s => {
      const children = [...s.children];
      const ds = [];
      for (let i=1; i<=count; i++) {
        ds.push(children[childIdx].descendants[i-1] || makeGrand(childIdx+1, i));
      }
      children[childIdx] = { ...children[childIdx], grandchildrenCount: count, descendants: ds };
      return { ...s, children };
    });
  };
  const setNibcount = (sibIdx, count) => {
    setState(s => {
      const siblings = [...s.siblings];
      const ds = [];
      for (let i=1; i<=count; i++) {
        ds.push(siblings[sibIdx].descendants[i-1] || makeNibling(sibIdx+1, i));
      }
      siblings[sibIdx] = { ...siblings[sibIdx], niblingsCount: count, descendants: ds };
      return { ...s, siblings };
    });
  };

  const reset = () => { setState(initialState); setShowResult(false); };
  const loadSample = (sample) => {
    setState(sample.apply());
    setShowResult(true);
    setTimeout(() => {
      const el = document.getElementById('result');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };

  // ───── ローカル保存 / URL共有 ─────
  const STORAGE_KEY = 'souzoku-app-state-v1';

  const saveLocal = () => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      alert('この端末（ブラウザ）に保存しました。次回開いたとき「読み込み」ボタンで復元できます。');
    } catch (e) {
      alert('保存に失敗しました：' + e.message);
    }
  };
  const loadLocal = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { alert('この端末に保存されたデータはありません。'); return; }
      setState(JSON.parse(raw));
      alert('保存内容を読み込みました。');
    } catch (e) {
      alert('読み込みに失敗しました：' + e.message);
    }
  };
  const clearLocal = () => {
    if (!confirm('この端末に保存されたデータを削除します。よろしいですか？')) return;
    try { localStorage.removeItem(STORAGE_KEY); alert('保存データを削除しました。'); }
    catch (e) { alert('削除に失敗しました：' + e.message); }
  };

  // URL ハッシュ共有：JSON → UTF-8 → Base64URL
  const encodeStateToHash = (s) => {
    const json = JSON.stringify(s);
    const bytes = new TextEncoder().encode(json);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  };
  const decodeHashToState = (h) => {
    let b64 = h.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  };
  const shareUrl = async () => {
    try {
      const hash = encodeStateToHash(state);
      const url = `${location.origin}${location.pathname}#data=${hash}`;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
        alert(`URLをクリップボードにコピーしました（${url.length}文字）。\nこのURLを開くと、同じ入力内容が再現されます。\n（データはURLに含まれており、サーバーには送信されません）`);
      } else {
        prompt('以下のURLをコピーしてください：', url);
      }
    } catch (e) {
      alert('URL生成に失敗しました：' + e.message);
    }
  };

  // 起動時：URLハッシュに data= があれば復元
  useEffect(() => {
    if (!location.hash) return;
    const m = location.hash.match(/data=([^&]+)/);
    if (!m) return;
    try {
      const restored = decodeHashToState(m[1]);
      setState(restored);
      setShowResult(true);
      // 復元後は履歴を綺麗にする
      history.replaceState(null, '', location.pathname);
    } catch (e) {
      console.warn('URLからの復元に失敗:', e);
    }
  }, []);

  return (
    <GlossaryContext.Provider value={ctxValue}>
    <div>
      <header className="mb-6 border-b border-stone-200 pb-4">
        <h1 className="text-2xl font-bold">法定相続分シミュレーター <span className="text-xs text-stone-500 align-middle">（試作版 R5）</span></h1>
        <p className="text-sm text-stone-600 mt-1">
          質問に答えると、<Term id="statutory-share">法定相続分</Term>（民法上の取り分）の目安を計算します。
          <span className="block text-xs text-stone-500 mt-1">青い<span className="text-blue-700 underline decoration-dotted">下線つきの言葉</span>はクリックで意味を表示します。</span>
        </p>
        <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1 mt-2">⚠ 本ツールの結果は参考値です。実際の手続では弁護士・司法書士・税理士等の専門家にご確認ください。</p>
      </header>

      {/* サンプルケース */}
      <section className="bg-indigo-50 border border-indigo-200 rounded-lg p-4 mb-6 no-print">
        <h3 className="font-bold text-stone-900 mb-1">📋 サンプルから始める</h3>
        <p className="text-xs text-stone-600 mb-3">典型的なケースをワンクリックで読み込めます。読み込んだ後、下のフォームで自由に編集できます。</p>
        <div className="grid sm:grid-cols-2 gap-2">
          {SAMPLES.map(s => (
            <button key={s.id} type="button"
              className="text-left bg-white hover:bg-indigo-100 border border-indigo-200 hover:border-indigo-400 rounded p-2 transition"
              onClick={() => loadSample(s)}>
              <div className="font-semibold text-sm text-stone-900">{s.title}</div>
              <div className="text-xs text-stone-500 mt-0.5">{s.desc}</div>
            </button>
          ))}
        </div>
      </section>

      {/* 保存・読込・URL共有 */}
      <section className="bg-stone-100 border border-stone-200 rounded-lg p-3 mb-6 no-print">
        <div className="flex flex-wrap gap-2 items-center">
          <span className="text-xs text-stone-600 mr-2">📦 入力内容：</span>
          <button type="button" onClick={saveLocal}
            className="px-3 py-1 text-xs bg-white border border-stone-300 rounded hover:bg-stone-50">💾 この端末に保存</button>
          <button type="button" onClick={loadLocal}
            className="px-3 py-1 text-xs bg-white border border-stone-300 rounded hover:bg-stone-50">📂 保存内容を読み込み</button>
          <button type="button" onClick={clearLocal}
            className="px-3 py-1 text-xs bg-white border border-stone-300 rounded hover:bg-stone-50 text-stone-600">🗑 保存削除</button>
          <button type="button" onClick={shareUrl}
            className="px-3 py-1 text-xs bg-emerald-600 text-white border border-emerald-700 rounded hover:bg-emerald-700">🔗 URLでシェア</button>
          <button type="button" onClick={reset}
            className="px-3 py-1 text-xs bg-white border border-stone-300 rounded hover:bg-stone-50 text-stone-600">↺ 入力をリセット</button>
        </div>
        <p className="text-xs text-stone-500 mt-2">※ 保存はお使いのブラウザのみ。サーバーには送信しません。URLにも家族構成データは入りますが、サーバー保存はありません。</p>
      </section>

      <section className="space-y-6">
        <div className="no-print space-y-6">
        {/* Q1：配偶者 */}
        <Card title="Q1. 亡くなった方に配偶者（夫または妻）はいますか？">
          <p className="text-xs text-stone-500 mb-2">
            <Term id="spouse">配偶者</Term>は常に相続人になります。ただし戸籍上の方のみで、<Term id="common-law">内縁関係</Term>の方は含まれません。
          </p>
          <Choice
            value={state.spouse.present}
            onChange={v => update({ spouse: { ...state.spouse, present: v } })}
            options={[
              { v: true,  label: 'はい（戸籍上の配偶者がいる）' },
              { v: false, label: 'いいえ（独身・死別・離婚済み）' }
            ]}
          />
          {state.spouse.present && (
            <div className="mt-3 pl-3 border-l-2 border-stone-200 space-y-2 text-sm">
              <div>
                <Toggle label="配偶者は相続放棄をしている" checked={state.spouse.renounced}
                  onChange={v => update({ spouse: { ...state.spouse, renounced: v } })} />
                <span className="ml-2 text-xs"><Term id="renounce">相続放棄とは？</Term></span>
              </div>
              <div>
                <Toggle label="配偶者は被相続人と同時に亡くなった（同時死亡の推定）" checked={!!state.spouse.simultaneousDeath}
                  onChange={v => update({ spouse: { ...state.spouse, simultaneousDeath: v } })} />
                <span className="ml-2 text-xs"><Term id="simultaneous-death">同時死亡の推定とは？</Term></span>
              </div>
            </div>
          )}
        </Card>

        {/* Q2：子 */}
        <Card title="Q2. 亡くなった方にお子さんはいますか？（亡くなったお子さんも含めて）">
          <p className="text-xs text-stone-500 mb-2">
            <Term id="child">お子さん（実子・養子）</Term>は第1順位の相続人です。亡くなっていても、その方のお子さん（孫）以下が<Term id="representation">代襲相続</Term>するので、含めて入力してください。
          </p>
          <Choice
            value={state.hasChildren}
            onChange={v => update({ hasChildren: v })}
            options={[
              { v: true,  label: 'はい' },
              { v: false, label: 'いいえ' }
            ]}
          />
          {state.hasChildren && (
            <div className="mt-3 pl-3 border-l-2 border-stone-200 space-y-3">
              <NumberPick label="お子さんの人数" value={state.childrenCount} min={1} max={10}
                onChange={n => update({ childrenCount: n })} />
              {state.children.map((c, idx) => (
                <div key={c.id} className="bg-stone-100 rounded p-3 space-y-2">
                  <div className="flex items-center gap-2">
                    <span className="badge bg-stone-700 text-white">{idx+1}</span>
                    <input className="border rounded px-2 py-1 text-sm flex-1" value={c.name}
                      onChange={e => setChild(idx, { name: e.target.value })} />
                  </div>
                  <div className="flex flex-wrap gap-3 text-sm items-center">
                    <AliveStatus alive={c.alive} onChange={v => toggleChildAlive(idx, v)} />
                    <AdoptedSelect value={c.adopted || null} onChange={v => setChild(idx, { adopted: v })} />
                  </div>
                  <div className="flex flex-wrap gap-4 text-sm items-center">
                    <Toggle label="相続放棄をした" checked={c.renounced} onChange={v => setChild(idx, { renounced: v })} />
                    <span>
                      <Toggle label="相続資格を失った（欠格・廃除）" checked={c.disqualified}
                        onChange={v => setChild(idx, { disqualified: v })} />
                      <HelpHint text="重大な事由（遺言書偽造等）で当然に資格を失う「相続欠格」、または家庭裁判所の審判で資格を失う「相続廃除」。放棄と違い、その方のお子さん（孫）が代襲相続できます。" />
                    </span>
                  </div>
                  {!c.alive && (
                    <div className="pl-3 border-l-2 border-stone-300 space-y-2 mt-1">
                      <p className="text-xs font-semibold text-stone-700">このお子さんが亡くなった時期は？</p>
                      <Choice
                        value={c.diedAfter ? 'after' : c.simultaneousDeath ? 'simul' : 'before'}
                        onChange={v => setChild(idx, {
                          diedAfter: v === 'after',
                          simultaneousDeath: v === 'simul'
                        })}
                        options={[
                          { v: 'before', label: '被相続人より前に死亡（代襲）' },
                          { v: 'simul',  label: '被相続人と同時死亡（推定／代襲）' },
                          { v: 'after',  label: '被相続人より後に死亡（数次相続）' }
                        ]}
                      />
                      {c.diedAfter ? (
                        <SuccessorsInput
                          value={c.successors}
                          ownerName={c.name}
                          onChange={succ => setChild(idx, { successors: succ })} />
                      ) : (
                        <>
                      <p className="text-xs text-stone-600">このお子さんの代わりに、そのお子さん（被相続人から見ると孫）が相続します（代襲相続）。</p>
                      <Toggle label="このお子さんに、お子さん（孫）はいる" checked={c.hasGrandchildren}
                        onChange={v => setChild(idx, { hasGrandchildren: v, grandchildrenCount: v ? Math.max(1, c.grandchildrenCount||1) : 0, descendants: v ? c.descendants : [] })} />
                      {c.hasGrandchildren && (
                        <>
                          <NumberPick label="お孫さんの人数" value={c.grandchildrenCount || 1} min={1} max={10}
                            onChange={n => setGrandcount(idx, n)} />
                          {(c.descendants || []).map((g, gi) => (
                            <div key={g.id} className="bg-white rounded border border-stone-200 p-2 flex flex-wrap gap-3 items-center">
                              <input className="border rounded px-2 py-1 text-sm" value={g.name}
                                onChange={e => {
                                  const ds = [...c.descendants];
                                  ds[gi] = { ...ds[gi], name: e.target.value };
                                  setChild(idx, { descendants: ds });
                                }} />
                              <AliveStatus alive={g.alive} onChange={v => {
                                const ds = [...c.descendants]; ds[gi] = { ...ds[gi], alive: v }; setChild(idx, { descendants: ds });
                              }} />
                              <Toggle label="相続放棄" checked={g.renounced} onChange={v => {
                                const ds = [...c.descendants]; ds[gi] = { ...ds[gi], renounced: v }; setChild(idx, { descendants: ds });
                              }} />
                              <Toggle label="欠格・廃除" checked={g.disqualified} onChange={v => {
                                const ds = [...c.descendants]; ds[gi] = { ...ds[gi], disqualified: v }; setChild(idx, { descendants: ds });
                              }} />
                            </div>
                          ))}
                        </>
                      )}
                        </>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </Card>

        {/* Q3：直系尊属（父母→祖父母 と世代単位で繰り上がる） */}
        <Card title="Q3. 亡くなった方のご両親はご存命ですか？">
          <p className="text-xs text-stone-500 mb-2">
            ※ お子さん（または<Term id="descendant">直系卑属</Term>）が1人でも相続する場合、ご両親は相続人になりません。それでも入力しておくと、放棄等で順位が変わったときに対応できます。
          </p>
          <Choice
            value={state.parentsStatus}
            onChange={v => update({ parentsStatus: v, parentsAliveCount: v === 'someAlive' ? (state.parentsAliveCount || 1) : 1, grandparentsStatus: v === 'allDead' ? state.grandparentsStatus : null })}
            options={[
              { v: 'someAlive', label: '少なくとも1人ご存命' },
              { v: 'allDead',   label: '両方とも亡くなっている' }
            ]}
          />
          {state.parentsStatus === 'someAlive' && (
            <div className="mt-3 pl-3 border-l-2 border-stone-200">
              <NumberPick label="ご存命のご両親の人数" value={state.parentsAliveCount || 1} min={1} max={2}
                onChange={n => update({ parentsAliveCount: n })} />
            </div>
          )}
          {state.parentsStatus === 'allDead' && (
            <div className="mt-4 pl-3 border-l-2 border-stone-200">
              <p className="text-sm font-semibold mb-2">
                それでは、<Term id="ascendant">ご祖父母</Term>はご存命ですか？
              </p>
              <p className="text-xs text-stone-500 mb-2">
                ご両親が全員亡くなっている場合、より上の世代であるご祖父母が相続人になります（<Term id="ascendant">直系尊属</Term>はより近い世代を優先）。
              </p>
              <Choice
                value={state.grandparentsStatus}
                onChange={v => update({ grandparentsStatus: v, grandparentsCount: v === 'someAlive' ? (state.grandparentsCount || 1) : 1 })}
                options={[
                  { v: 'someAlive', label: 'ご存命の祖父母がいる' },
                  { v: 'allDead',   label: '祖父母も全員亡くなっている' }
                ]}
              />
              {state.grandparentsStatus === 'someAlive' && (
                <div className="mt-3 pl-3 border-l-2 border-stone-300 space-y-2">
                  <NumberPick label="ご存命の祖父母の人数" value={state.grandparentsCount || 1} min={1} max={4}
                    onChange={n => update({ grandparentsCount: n })} />
                  {state.grandparents.slice(0, state.grandparentsCount || 1).map((gp, idx) => (
                    <div key={gp.id} className="flex items-center gap-2 bg-stone-50 rounded p-2">
                      <span className="badge bg-stone-700 text-white">{idx+1}</span>
                      <input className="border rounded px-2 py-1 text-sm flex-1" value={gp.name}
                        onChange={e => {
                          const arr = [...state.grandparents];
                          arr[idx] = { ...arr[idx], name: e.target.value };
                          update({ grandparents: arr });
                        }} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </Card>

        {/* Q4：兄弟姉妹 */}
        <Card title="Q4. 亡くなった方にご兄弟姉妹はいますか？（亡くなった方も含めて）">
          <p className="text-xs text-stone-500 mb-2">
            ※ <Term id="sibling">兄弟姉妹</Term>はお子さんもご両親（祖父母世代も含めた<Term id="ascendant">直系尊属</Term>）もいない場合に相続人となります。<Term id="half-blood">半血兄弟</Term>がいる場合は下のチェックでお知らせください。
          </p>
          <Choice
            value={state.hasSiblings}
            onChange={v => update({ hasSiblings: v })}
            options={[
              { v: true,  label: 'はい' },
              { v: false, label: 'いいえ' }
            ]}
          />
          {state.hasSiblings && (
            <div className="mt-3 pl-3 border-l-2 border-stone-200 space-y-3">
              <NumberPick label="ご兄弟姉妹の人数" value={state.siblingsCount} min={1} max={10}
                onChange={n => update({ siblingsCount: n })} />
              {state.siblings.map((s, idx) => (
                <div key={s.id} className="bg-stone-100 rounded p-3 space-y-2">
                  <div className="flex items-center gap-2">
                    <span className="badge bg-stone-700 text-white">{idx+1}</span>
                    <input className="border rounded px-2 py-1 text-sm flex-1" value={s.name}
                      onChange={e => setSibling(idx, { name: e.target.value })} />
                  </div>
                  <div className="flex flex-wrap gap-3 text-sm items-center">
                    <AliveStatus alive={s.alive} onChange={v => setSibling(idx, { alive: v, hasNiblings: v ? false : s.hasNiblings })} />
                    <span>
                      <Toggle label="半血（父母の一方のみ同じ）" checked={s.halfBlood}
                        onChange={v => setSibling(idx, { halfBlood: v })} />
                      <HelpHint text="父母のうち一方のみが同じご兄弟（異父・異母兄弟）を「半血」といい、両親とも同じ「全血」の1/2の相続分になります（民法900条4号但書）。" />
                    </span>
                  </div>
                  <div className="flex flex-wrap gap-4 text-sm items-center">
                    <Toggle label="相続放棄" checked={s.renounced} onChange={v => setSibling(idx, { renounced: v })} />
                    <span>
                      <Toggle label="相続資格を失った（欠格・廃除）" checked={s.disqualified}
                        onChange={v => setSibling(idx, { disqualified: v })} />
                      <HelpHint text="放棄と違い、その方のお子さん（甥・姪）が代襲相続できます。" />
                    </span>
                  </div>
                  {!s.alive && (
                    <div className="pl-3 border-l-2 border-stone-300 space-y-2 mt-1">
                      <p className="text-xs font-semibold text-stone-700">この方が亡くなった時期は？</p>
                      <Choice
                        value={s.diedAfter ? 'after' : s.simultaneousDeath ? 'simul' : 'before'}
                        onChange={v => setSibling(idx, {
                          diedAfter: v === 'after',
                          simultaneousDeath: v === 'simul'
                        })}
                        options={[
                          { v: 'before', label: '被相続人より前に死亡（代襲）' },
                          { v: 'simul',  label: '被相続人と同時死亡（推定／代襲）' },
                          { v: 'after',  label: '被相続人より後に死亡（数次相続）' }
                        ]}
                      />
                      <p className="text-xs text-stone-500">
                        <Term id="representation">代襲</Term>と<Term id="sequential">数次相続</Term>では、最終的に誰が財産を受け取るかが変わります。
                      </p>

                      {!s.diedAfter ? (
                        <>
                          <p className="text-xs text-stone-600">
                            この方の代わりに、そのお子さん（甥姪）が相続します（<Term id="re-representation">ご兄弟の代襲は1代限り</Term>）。
                          </p>
                          <Toggle label="この方にお子さん（甥姪）はいる" checked={s.hasNiblings}
                            onChange={v => setSibling(idx, { hasNiblings: v, niblingsCount: v ? Math.max(1, s.niblingsCount||1) : 0, descendants: v ? s.descendants : [] })} />
                          {s.hasNiblings && (
                            <>
                              <NumberPick label="甥姪の人数" value={s.niblingsCount || 1} min={1} max={10}
                                onChange={n => setNibcount(idx, n)} />
                              {(s.descendants || []).map((g, gi) => (
                                <div key={g.id} className="bg-white rounded border border-stone-200 p-2 flex flex-wrap gap-3 items-center">
                                  <input className="border rounded px-2 py-1 text-sm" value={g.name}
                                    onChange={e => {
                                      const ds = [...s.descendants];
                                      ds[gi] = { ...ds[gi], name: e.target.value };
                                      setSibling(idx, { descendants: ds });
                                    }} />
                                  <AliveStatus alive={g.alive} onChange={v => {
                                    const ds = [...s.descendants]; ds[gi] = { ...ds[gi], alive: v }; setSibling(idx, { descendants: ds });
                                  }} />
                                  <Toggle label="相続放棄" checked={g.renounced} onChange={v => {
                                    const ds = [...s.descendants]; ds[gi] = { ...ds[gi], renounced: v }; setSibling(idx, { descendants: ds });
                                  }} />
                                  <Toggle label="欠格・廃除" checked={g.disqualified} onChange={v => {
                                    const ds = [...s.descendants]; ds[gi] = { ...ds[gi], disqualified: v }; setSibling(idx, { descendants: ds });
                                  }} />
                                </div>
                              ))}
                              <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1.5 mt-2">
                                ご注意：甥姪が亡くなっていても、その下の世代（甥姪のお子さん）には代襲相続されません（<Term id="re-representation">兄弟側のリレーは甥姪まで</Term>）。他に相続人がいなければ「相続人不存在」となり、家庭裁判所での特別な手続きが必要になることがあります。
                              </p>
                            </>
                          )}
                        </>
                      ) : (
                        <SuccessorsInput
                          value={s.successors}
                          ownerName={s.name}
                          onChange={succ => setSibling(idx, { successors: succ })} />
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </Card>

        <div className="flex gap-3">
          <button
            className="px-4 py-2 bg-stone-900 text-white rounded hover:bg-stone-700 disabled:opacity-50"
            disabled={state.spouse.present === null || state.hasChildren === null}
            onClick={() => setShowResult(true)}>
            計算する
          </button>
          <button className="px-4 py-2 bg-stone-100 border border-stone-300 rounded hover:bg-stone-200" onClick={reset}>
            リセット
          </button>
        </div>
        </div>

        {showResult && <ResultView result={result} input={calcInput} />}
      </section>

      <div className="no-print">
        <QASection />
        <GlossaryList />
      </div>

      <footer className="mt-10 text-xs text-stone-500 border-t pt-4 no-print">
        試作版 R4+ / 対応：基本3ケース・代襲・再代襲（無限）・相続放棄・半血兄弟・養子（普通／特別）・欠格／廃除・祖父母世代・<b>数次相続（再帰、子・兄弟姉妹両対応）</b>・関係図表示・印刷／PDF出力。
      </footer>

      <GlossaryPopup termId={openTerm} onClose={() => setOpenTerm(null)} />
    </div>
    </GlossaryContext.Provider>
  );
}

function Card({ title, children }) {
  return (
    <div className="bg-white border border-stone-200 rounded-lg p-4 shadow-sm">
      <h3 className="font-semibold mb-3">{title}</h3>
      {children}
    </div>
  );
}

function Choice({ value, onChange, options }) {
  return (
    <div className="flex flex-wrap gap-2">
      {options.map(o => (
        <button key={String(o.v)}
          className={`px-3 py-1.5 rounded border text-sm ${value === o.v ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-800 border-stone-300 hover:bg-stone-50'}`}
          onClick={() => onChange(o.v)}>{o.label}</button>
      ))}
    </div>
  );
}

function Toggle({ label, checked, onChange }) {
  return (
    <label className="inline-flex items-center gap-2 cursor-pointer">
      <input type="checkbox" checked={!!checked} onChange={e => onChange(e.target.checked)} className="accent-stone-900" />
      <span>{label}</span>
    </label>
  );
}

function AliveStatus({ alive, onChange }) {
  const base = 'px-3 py-1 text-sm border';
  return (
    <div className="inline-flex rounded overflow-hidden text-sm">
      <button type="button"
        className={`${base} rounded-l ${alive ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-700 border-stone-300 hover:bg-stone-50'}`}
        onClick={() => onChange(true)}>ご存命</button>
      <button type="button"
        className={`${base} rounded-r -ml-px ${!alive ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-700 border-stone-300 hover:bg-stone-50'}`}
        onClick={() => onChange(false)}>亡くなっている</button>
    </div>
  );
}

function AdoptedSelect({ value, onChange }) {
  const opts = [
    { v: null, label: '実子' },
    { v: 'normal', label: '普通養子' },
    { v: 'special', label: '特別養子' }
  ];
  return (
    <label className="inline-flex items-center gap-2 text-sm">
      <span className="text-stone-600">続柄：</span>
      <div className="inline-flex">
        {opts.map((o, i) => (
          <button key={String(o.v)} type="button"
            className={`px-2.5 py-1 text-xs border ${i===0 ? 'rounded-l' : ''} ${i===opts.length-1 ? 'rounded-r' : ''} ${i>0 ? '-ml-px' : ''} ${value===o.v ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-700 border-stone-300 hover:bg-stone-50'}`}
            onClick={() => onChange(o.v)}>{o.label}</button>
        ))}
      </div>
    </label>
  );
}

function HelpHint({ text }) {
  return (
    <span className="ml-1 inline-block align-middle text-xs text-stone-400 cursor-help" title={text}>ⓘ</span>
  );
}

// 数次相続：「後死」者の相続人（配偶者＋子）入力
function SuccessorsInput({ value, onChange, ownerName }) {
  const v = value || { spouse: { present: false, alive: true, name: '' }, children: [] };
  const spouse = v.spouse || { present: false, alive: true, name: '' };
  const children = v.children || [];

  const update = (patch) => onChange({ ...v, ...patch });
  const updateSpouse = (patch) => update({ spouse: { ...spouse, ...patch } });

  const setChildCount = (n) => {
    const arr = [];
    for (let i = 1; i <= n; i++) {
      arr.push(children[i-1] || { id: `succ-${Date.now()}-${i}`, name: `${ownerName || 'この方'}のお子さん${i}`, alive: true, renounced: false });
    }
    update({ children: arr });
  };

  return (
    <div className="bg-yellow-50 border border-yellow-300 rounded p-3 space-y-2 text-sm">
      <p className="font-semibold text-stone-800">📌 {ownerName || 'この方'}（被相続人より後に亡くなった方）の相続人を入力してください</p>
      <p className="text-xs text-stone-600">
        この方が一旦受け取った取り分は、この方の相続人に承継されます（<Term id="sequential">数次相続</Term>）。
      </p>
      <div className="space-y-1.5">
        <Toggle label="配偶者がいる（ご存命）" checked={spouse.present}
          onChange={present => updateSpouse({ present })} />
        {spouse.present && (
          <input type="text" placeholder="配偶者の名前"
            value={spouse.name || ''}
            onChange={e => updateSpouse({ name: e.target.value })}
            className="border rounded px-2 py-1 text-sm ml-6 block w-48" />
        )}
      </div>
      <NumberPick label="お子さんの人数" value={children.length} min={0} max={10}
        onChange={setChildCount} />
      {children.map((c, i) => (
        <div key={c.id} className="ml-6 flex gap-2 items-center">
          <span className="text-xs text-stone-500">{i+1}.</span>
          <input type="text" value={c.name}
            onChange={e => {
              const arr = [...children];
              arr[i] = { ...arr[i], name: e.target.value };
              update({ children: arr });
            }}
            className="border rounded px-2 py-1 text-sm flex-1" />
        </div>
      ))}
      {!spouse.present && children.length === 0 && (
        <p className="text-xs text-amber-800 bg-amber-100 rounded px-2 py-1">
          ⚠ 相続人を1人以上入力してください。誰も入力されていないと、この方の取り分の承継先が決まりません。
        </p>
      )}
    </div>
  );
}

// 専門用語：クリックで解説ポップアップを開く
function Term({ id, children }) {
  const ctx = useContext(GlossaryContext);
  return (
    <button type="button"
      className="text-blue-700 underline decoration-dotted underline-offset-2 hover:text-blue-900"
      onClick={() => ctx.open(id)}>{children}</button>
  );
}

// 図のラッパー

function NumberPick({ label, value, min, max, onChange }) {
  return (
    <label className="inline-flex items-center gap-2 text-sm">
      <span>{label}：</span>
      <input type="number" min={min} max={max} value={value}
        onChange={e => {
          const n = Math.max(min, Math.min(max, parseInt(e.target.value || min, 10)));
          onChange(n);
        }}
        className="w-20 border rounded px-2 py-1" />
    </label>
  );
}

// 簡易な家系図風の関係図（HTMLベース）
function RelationDiagram({ input, result }) {
  const shareMap = new Map();
  for (const r of result.rows) {
    const key = (r.person && r.person.name) || r.label;
    if (key) {
      shareMap.set(key, (shareMap.get(key) || []).concat([formatFrac(r.share)]));
    }
  }
  const node = (name, role, opts = {}) => {
    const shares = shareMap.get(name) || [];
    const cls = ['rel-node'];
    if (opts.decedent) cls.push('decedent');
    else if (shares.length > 0) cls.push('heir');
    if (opts.dead) cls.push('dead');
    return (
      <div className={cls.join(' ')}>
        <div className="role">{role}</div>
        <div className="name">{name || '（無名）'}</div>
        {shares.map((s, i) => <div key={i} className="share">{s}</div>)}
      </div>
    );
  };

  const successorsBranch = (succ) => {
    if (!succ) return null;
    const sp = succ.spouse;
    return (
      <div className="flex flex-wrap gap-1.5 justify-center">
        {sp && sp.present && <div>{node(sp.name, '配偶者')}</div>}
        {(succ.children || []).map((sc, sci) => (
          <div key={sci}>
            {node(sc.name, '子', { dead: sc.alive === false })}
            {sc.diedAfter && sc.successors && (
              <>
                <div className="rel-link" />
                {successorsBranch(sc.successors)}
              </>
            )}
          </div>
        ))}
      </div>
    );
  };

  const grandparents = (input.grandparents || []);
  const parents = (input.parents || []);
  const spouse = input.spouse;
  const children = (input.children || []);
  const siblings = (input.siblings || []);

  return (
    <div className="bg-white border border-stone-200 rounded-lg p-4 my-3 overflow-x-auto">
      <h4 className="font-bold text-stone-800 mb-3 text-sm">📐 相続関係図</h4>
      <div className="space-y-2.5 text-center min-w-[320px]">
        {grandparents.length > 0 && (
          <>
            <div className="text-xs text-stone-500">祖父母世代</div>
            <div className="flex justify-center flex-wrap gap-2">
              {grandparents.map((gp, i) => <div key={i}>{node(gp.name, '祖父母')}</div>)}
            </div>
            <div className="rel-link" />
          </>
        )}
        {parents.length > 0 && (
          <>
            <div className="text-xs text-stone-500">父母世代</div>
            <div className="flex justify-center flex-wrap gap-2">
              {parents.map((p, i) => <div key={i}>{node(p.name, '父母', { dead: p.alive === false })}</div>)}
            </div>
            <div className="rel-link" />
          </>
        )}
        <div className="flex justify-center flex-wrap items-start gap-3">
          {spouse && spouse.present && (
            <>
              {node(spouse.name || '配偶者', '配偶者', { dead: spouse.alive === false })}
              <div className="self-center text-stone-400 px-1">═</div>
            </>
          )}
          {node('被相続人', '亡くなった方', { decedent: true })}
          {siblings.length > 0 && (
            <>
              <div className="self-center text-stone-400 px-1">─</div>
              <div className="flex flex-wrap gap-2 justify-center">
                {siblings.map((s, i) => (
                  <div key={i} className="flex flex-col items-center">
                    {node(s.name, s.halfBlood ? '兄弟姉妹（半血）' : '兄弟姉妹', { dead: s.alive === false })}
                    {!s.alive && !s.diedAfter && (s.descendants || []).length > 0 && (
                      <>
                        <div className="rel-link" />
                        <div className="flex flex-wrap gap-1 justify-center">
                          {s.descendants.map((g, gi) => (
                            <div key={gi}>{node(g.name, '甥姪', { dead: g.alive === false })}</div>
                          ))}
                        </div>
                      </>
                    )}
                    {s.diedAfter && s.successors && (
                      <>
                        <div className="rel-link" />
                        {successorsBranch(s.successors)}
                      </>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
        {children.length > 0 && (
          <>
            <div className="rel-link" />
            <div className="text-xs text-stone-500">お子さん（直系卑属）</div>
            <div className="flex justify-center flex-wrap gap-3">
              {children.map((c, i) => (
                <div key={i} className="flex flex-col items-center">
                  {node(c.name, c.adopted === 'normal' ? '子（普通養子）' : c.adopted === 'special' ? '子（特別養子）' : '子', { dead: c.alive === false })}
                  {!c.alive && !c.diedAfter && (c.descendants || []).length > 0 && (
                    <>
                      <div className="rel-link" />
                      <div className="flex flex-wrap gap-1 justify-center">
                        {c.descendants.map((g, gi) => (
                          <div key={gi}>{node(g.name, '孫', { dead: g.alive === false })}</div>
                        ))}
                      </div>
                    </>
                  )}
                  {c.diedAfter && c.successors && (
                    <>
                      <div className="rel-link" />
                      {successorsBranch(c.successors)}
                    </>
                  )}
                </div>
              ))}
            </div>
          </>
        )}
      </div>
      <p className="text-xs text-stone-500 mt-3">
        🟢 緑のノードが法定相続人。ノード下の数字が法定相続分です。
      </p>
    </div>
  );
}

function ResultView({ result, input }) {
  return (
    <div id="result" className="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
      <h2 className="text-lg font-bold mb-2">計算結果</h2>
      <p className="text-xs text-stone-600 mb-3">
        ここに表示されるのは、相続人全員での<Term id="estate-division">遺産分割協議</Term>がまとまらなかったときの法律上の取り分（<Term id="statutory-share">法定相続分</Term>）です。話し合いで合意すれば、別の割合で分けることもできます。
      </p>
      <RelationDiagram input={input} result={result} />
      {result.rows.length === 0 ? (
        <div className="text-stone-700 text-sm space-y-2">
          <p className="font-semibold">該当する相続人が見つかりません。</p>
          <p>下記いずれかのパターンが考えられます：</p>
          <ul className="list-disc pl-5 space-y-1 text-xs">
            <li>配偶者なし、お子さん・お孫さん（直系卑属）もなし、ご両親・祖父母（<Term id="ascendant">直系尊属</Term>）もなし、ご兄弟・甥姪もなし</li>
            <li>ご兄弟が亡くなっており、甥姪も全員亡くなっている（<Term id="re-representation">兄弟側のリレーは甥姪まで</Term>。それ以降は引き継がれません）</li>
            <li>すべての相続候補者が相続放棄をしている</li>
          </ul>
          <div className="bg-amber-50 border border-amber-200 rounded p-2 text-xs leading-relaxed mt-2">
            このような状態は「相続人不存在」と呼ばれます。財産は最終的に国庫に納まる手続きへ進む可能性がありますが、生前に被相続人と特別な縁故があった方（内縁の配偶者・献身的に介護した方など）は「特別縁故者」として家庭裁判所に申立てをすれば、財産の一部を受け取れることがあります。具体的な手続きは弁護士・司法書士にご相談ください。
          </div>
        </div>
      ) : (
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-stone-600 border-b border-emerald-200">
              <th className="py-1">相続人</th>
              <th className="py-1">続柄</th>
              <th className="py-1 text-right">法定相続分</th>
              <th className="py-1">備考</th>
            </tr>
          </thead>
          <tbody>
            {result.rows.map((r, i) => (
              <tr key={i} className="border-b border-emerald-100">
                <td className="py-1.5">{r.person?.name || r.label}</td>
                <td className="py-1.5">{r.label}</td>
                <td className="py-1.5 text-right font-mono text-base">{formatFrac(r.share)}</td>
                <td className="py-1.5 text-stone-600">{r.note}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {result.explanations.length > 0 && (
        <div className="mt-3 text-sm text-stone-700">
          <h4 className="font-semibold mb-1">計算の根拠</h4>
          <ul className="list-disc pl-5 space-y-1">
            {result.explanations.map((e, i) => <li key={i}>{e}</li>)}
          </ul>
        </div>
      )}

      {result.citations.length > 0 && (
        <div className="mt-2 text-xs text-stone-500">参考条文：{result.citations.join('、')}</div>
      )}
      <div className="flex gap-2 mt-4 no-print">
        <button type="button"
          className="px-3 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700"
          onClick={() => window.print()}>
          🖨 印刷／PDFとして保存
        </button>
        <span className="text-xs text-stone-500 self-center">
          ブラウザの印刷ダイアログで「PDF として保存」を選べます。
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
